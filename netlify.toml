[build]
  publish   = "dist"
  command   = "npm run build"
  functions = "netlify/functions"

[dev]
  command    = "vite"
  targetPort = 5173
  port       = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/parse"
  to = "/.netlify/functions/parse"
  status = 200

[[redirects]]
  from = "/api/brief"
  to = "/.netlify/functions/brief"
  status = 200

[[redirects]]
  from = "/api/lookup"
  to = "/.netlify/functions/lookup"
  status = 200

[[redirects]]
  from = "/api/build-protocol"
  to = "/.netlify/functions/build-protocol"
  status = 200

[[redirects]]
  from = "/api/evidence"
  to = "/.netlify/functions/evidence"
  status = 200

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
